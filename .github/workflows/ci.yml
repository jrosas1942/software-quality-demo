name: CI Pipeline

on: [push]

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Code Quality
      run: flake8 app/

    - name: Run Tests with Coverage
      run: pytest --cov=app --cov-report=term-missing --cov-report=xml --cov-fail-under=80

    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: coverage.xml

  deploy:
    runs-on: ubuntu-latest
    needs: quality
    if: github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v4

    - name: Simular despliegue
      run: |
        echo "Desplegando aplicación a entorno de pruebas..."
        # Aquí podrías agregar comandos reales de despliegue (ej. a un servidor)

    - name: Crear artefacto de release
      run: |
        mkdir -p release
        cp -r app release/
        cp requirements.txt release/
        tar -czf release.tar.gz release/

    - name: Subir artefacto
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: release.tar.gz